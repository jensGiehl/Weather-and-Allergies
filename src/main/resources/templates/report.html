<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symptome erfassen – Allergietagebuch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <style>
        * { -webkit-tap-highlight-color: transparent; }

        body {
            background: #f0f4f8;
            overscroll-behavior-y: none;
        }

        .input-header {
            background: linear-gradient(145deg, #1565c0 0%, #0288d1 60%, #00acc1 100%);
            color: white;
            padding: 1rem 1rem 1.1rem;
        }

        .input-header .back-link {
            color: rgba(255,255,255,0.85);
            font-size: 0.78rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .input-header .back-link:hover { color: white; }

        .input-header .title { font-weight: 700; font-size: 1.15rem; }
        .input-header .date  { font-size: 0.8rem; opacity: 0.85; }

        .section-bar {
            background: white;
            border-bottom: 2px solid #e3e8ef;
            padding: 0.9rem 1rem;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .section-bar h2 {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 0;
            color: #1a237e;
        }

        .person-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
        }

        .person-btn {
            min-height: 42vw;
            border-radius: 18px;
            border-width: 2.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .person-btn .person-icon { font-size: 2.8rem; line-height: 1; }

        .person-entry-badge {
            font-size: 0.72rem;
            font-weight: 700;
            opacity: 0.85;
        }

        .person-btn.active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
            background-color: #1565c0;
            border-color: #1565c0;
            color: white;
        }

        .symptom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 12px 20px;
        }

        .symptom-btn {
            min-height: 90px;
            border-radius: 14px;
            border-width: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: transform 0.12s ease;
        }

        .symptom-btn .symptom-icon { font-size: 1.9rem; line-height: 1; }

        .symptom-btn.active {
            transform: scale(0.95);
            background-color: #1565c0;
            border-color: #1565c0;
            color: white;
        }

        .symptom-btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .save-badge {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1060;
            background: #2e7d32;
            color: white;
            border-radius: 50px;
            padding: 0.45rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }

        .save-badge.show {
            opacity: 1;
            transform: translateY(0);
        }

        .no-person-hint {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #90a4ae;
        }
    </style>
</head>
<body>

<header class="input-header">
    <a th:href="@{'/day/' + ${reportDateIso}}" class="back-link">
        <i class="bi bi-arrow-left"></i>Zur Tagesübersicht
    </a>
    <div class="title mt-1">Symptome erfassen</div>
    <div class="date" th:text="${date}">Dienstag, 27. Mai 2025</div>
</header>

<section id="person-section">
    <div class="section-bar">
        <h2><i class="bi bi-people-fill me-2 text-primary"></i>Wer hat Symptome?</h2>
    </div>
    <div class="person-grid">
        <button type="button"
                class="person-btn btn-outline-primary"
                th:each="person : ${persons}"
                th:attr="data-person=${person.name}"
                th:id="'person-' + ${person.name}">
            <span class="person-icon" th:text="${person.emoji()}"></span>
            <span th:text="${person.name}">Papa</span>
            <span class="person-entry-badge" style="display:none">&#10003; erfasst</span>
        </button>
    </div>
</section>

<section id="symptom-section">
    <div class="section-bar">
        <h2><i class="bi bi-clipboard2-pulse me-2 text-danger"></i>Welche Symptome?</h2>
    </div>

    <div class="no-person-hint" id="noPersonHint">
        <i class="bi bi-arrow-up-circle" style="font-size:2rem"></i>
        <p class="mt-2 mb-0" style="font-size:0.9rem">Bitte zuerst eine Person auswählen</p>
    </div>

    <div class="symptom-grid" id="symptomGrid">
        <button type="button"
                class="symptom-btn btn-outline-primary"
                th:each="symptom : ${symptoms}"
                th:attr="data-symptom=${symptom.code}"
                th:id="'symptom-' + ${symptom.code}"
                disabled>
            <i class="bi symptom-icon" th:classappend="${symptom.icon}"></i>
            <span th:text="${symptom.label}">Niesen</span>
        </button>
    </div>
</section>

<div class="save-badge" id="saveBadge">
    <i class="bi bi-check2-circle me-1"></i>Gespeichert
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const REPORT_ID = /*[[${reportId}]]*/ '';
    const EXISTING = JSON.parse(/*[[${existingEntriesJson}]]*/ '{}');

    let selectedPerson = null;
    let selectedSymptoms = new Set();
    let saveTimer = null;
    let badgeTimer = null;

    const personBtns   = document.querySelectorAll('.person-btn');
    const symptomBtns  = document.querySelectorAll('.symptom-btn');
    const noPersonHint = document.getElementById('noPersonHint');
    const saveBadge    = document.getElementById('saveBadge');

    personBtns.forEach(btn => {
        const saved = EXISTING[btn.dataset.person];
        if (saved && saved.some(s => s.trim() !== '')) {
            btn.querySelector('.person-entry-badge').style.display = '';
        }
    });

    function activatePerson(btn) {
        btn.classList.remove('btn-outline-primary');
        btn.classList.add('active');
    }

    function deactivatePerson(btn) {
        btn.classList.add('btn-outline-primary');
        btn.classList.remove('active');
    }

    personBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            personBtns.forEach(deactivatePerson);
            activatePerson(btn);
            selectedPerson = btn.dataset.person;

            const saved = EXISTING[selectedPerson] || [];
            selectedSymptoms = new Set(saved.filter(s => s.trim() !== ''));

            enableSymptomGrid();
            refreshSymptomUI();

            document.getElementById('symptom-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

            if (selectedSymptoms.size > 0) scheduleSave();
        });
    });

    symptomBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (!selectedPerson) return;
            const code = btn.dataset.symptom;
            if (selectedSymptoms.has(code)) {
                selectedSymptoms.delete(code);
            } else {
                selectedSymptoms.add(code);
            }
            refreshSymptomUI();
            if (selectedSymptoms.size > 0) scheduleSave();
        });
    });

    function enableSymptomGrid() {
        noPersonHint.style.display = 'none';
        symptomBtns.forEach(b => b.removeAttribute('disabled'));
    }

    function refreshSymptomUI() {
        symptomBtns.forEach(btn => {
            const selected = selectedSymptoms.has(btn.dataset.symptom);
            btn.classList.toggle('active', selected);
        });
    }

    function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(doSave, 600);
    }

    async function doSave() {
        if (!selectedPerson || selectedSymptoms.size === 0) return;
        try {
            const res = await fetch(`/api/report/${REPORT_ID}/entry`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ personName: selectedPerson, symptoms: [...selectedSymptoms] })
            });
            if (res.ok) {
                EXISTING[selectedPerson] = [...selectedSymptoms];
                const badge = document.querySelector(`#person-${selectedPerson} .person-entry-badge`);
                if (badge) badge.style.display = '';
                showSaveBadge();
            }
        } catch (e) {
            console.error('Speichern fehlgeschlagen', e);
        }
    }

    function showSaveBadge() {
        clearTimeout(badgeTimer);
        saveBadge.classList.add('show');
        badgeTimer = setTimeout(() => saveBadge.classList.remove('show'), 2200);
    }
    /*]]>*/
</script>
</body>
</html>
