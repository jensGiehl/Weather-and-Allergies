spring.application.name=daily-report-weather-and-quality-report
spring.main.banner-mode=off

# Database
spring.datasource.url=jdbc:h2:file:./data/allergydb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Location & Open-Meteo Weather API
weather.latitude=49.5366
weather.longitude=8.3483
weather.location-name=Frankenthal
weather.timezone=Europe/Berlin
weather.api-url=https://api.open-meteo.com/v1/forecast
weather.daily-variables=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,weathercode,uv_index_max,sunrise,sunset
weather.hourly-variables=temperature_2m

# Open-Meteo Air Quality API (Pollen + European AQI)
pollen.api-url=https://air-quality-api.open-meteo.com/v1/air-quality
pollen.hourly-variables=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen,european_aqi

# Telegram Bot
telegram.bot-token=DEIN_BOT_TOKEN_HIER
telegram.chat-id=DEINE_CHAT_ID_HIER
telegram.api-url=https://api.telegram.org

# Application
app.base-url=http://localhost:8080

# Scheduler
scheduler.cron=0 0 7 * * *
scheduler.weekly-cron=0 0 20 * * SUN
scheduler.timezone=Europe/Berlin
